# Full Docker Compose Deployment Sample Generated by Setup Wizard: `make base` and `make storage`
# This sample uses PostgreSQL for every knowledge store and two VLLM services.
# Copy `env.docker-compose-full` to `.env` before starting this compose file.
# You can customize your setup using the Setup Wizard; for detailed instructions, please refer to docs/InteractiveSetup.md
services:
  lightrag:
    # Repo-owned image name, pinned to the vendored LightRAG version
    # (lightrag/_version.py). pull_policy: build guarantees `docker compose
    # pull`/`up` can never replace the local build with upstream's image.
    image: oceanstack-lightrag:1.5.4
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - oceanstack-lightrag:1.5.4
    ports:
      # Loopback-only by default: the API is unauthenticated unless
      # LIGHTRAG_API_KEY / AUTH_ACCOUNTS are set in .env. Reach it via an
      # SSH tunnel (ssh -L 9621:127.0.0.1:9621 <host>), or set
      # LIGHTRAG_API_KEY before binding to a public interface.
      - "127.0.0.1:9621:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./config.ini:/app/config.ini
      - ./data/prompts:/app/data/prompts
      - ./.env:/app/.env
    restart: unless-stopped
    healthcheck:
      # The image has no curl; use Python's stdlib instead.
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:9621/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Bound resources so a runaway container cannot starve the host's
    # native PostgreSQL or GPU training workloads. Adjust per host.
    mem_limit: 8g
    cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      EMBEDDING_BINDING_HOST: "http://vllm-embed:8001/v1"
      RERANK_BINDING_HOST: "http://vllm-rerank:8000/rerank"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      WORKING_DIR: "/app/data/rag_storage"
      PROMPT_DIR: "/app/data/prompts"
    depends_on:
      vllm-embed:
        condition: service_healthy
      vllm-rerank:
        condition: service_healthy
      postgres:
        condition: service_healthy

  vllm-embed:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    command: >
      --model ${VLLM_EMBED_MODEL:-BAAI/bge-m3}
      --port ${VLLM_EMBED_PORT:-8001}
      --dtype float16
      --api-key ${VLLM_EMBED_API_KEY}
      ${VLLM_EMBED_EXTRA_ARGS:-}
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${VLLM_EMBED_PORT:-8001}:${VLLM_EMBED_PORT:-8001}"
    volumes:
      - vllm_embed_cache:/root/.cache/huggingface
    ipc: host
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' ${VLLM_EMBED_PORT:-8001})"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  vllm-rerank:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    command: >
      --model ${VLLM_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      --port ${VLLM_RERANK_PORT:-8000}
      --dtype float16
      --api-key ${VLLM_RERANK_API_KEY}
      ${VLLM_RERANK_EXTRA_ARGS:-}
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${VLLM_RERANK_PORT:-8000}:${VLLM_RERANK_PORT:-8000}"
    volumes:
      - vllm_rerank_cache:/root/.cache/huggingface
    ipc: host
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' ${VLLM_RERANK_PORT:-8000})"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: oceanstack-postgres:pg18-age-pgvector
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.postgres
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      # Readiness (accepts connections), not just a listening socket.
      test:
        - CMD-SHELL
        - 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 10s
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-rag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?missing}"
      POSTGRES_DB: "${POSTGRES_DATABASE:-rag}"

volumes:
  vllm_embed_cache:
  vllm_rerank_cache:
  postgres_data:
