name: CI

# Manual pre-commit gate, automated: ruff lint, the offline pytest suite, and a
# WebUI lint+build. Pyrefly runs as an informational typecheck over the fork's
# own code. Integration/DB tests are skipped by default (conftest gates them on
# --run-integration / LIGHTRAG_RUN_INTEGRATION).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: ruff + pytest (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Sync deps (test + offline backends)
        run: uv sync --extra test --extra offline --python 3.12
      - name: Ruff lint
        run: uv run ruff check .
      - name: Pytest (offline; integration auto-skipped)
        run: uv run pytest tests -q

  typecheck:
    name: pyrefly (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --extra test --extra offline --python 3.12
      - name: Pyrefly check (fork-owned code; informational, never blocks)
        # Findings are surfaced in the log for humans; the fork is not yet fully
        # typed, so this must not gate the build. `|| true` keeps the check green.
        run: uv run --with pyrefly pyrefly check lightrag/operate.py lightrag/prompt.py lightrag/llm/ollama.py || true

  webui:
    name: webui lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lightrag_webui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
