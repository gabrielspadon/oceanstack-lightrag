"entity_types_guidance": |-
  OceanStack code-and-data knowledge-graph taxonomy. Classify each entity as exactly one type below; if none fit, use CONCEPT (non-domain) or AIS_CONCEPT (maritime). Emit the MOST SPECIFIC type.

  ## Entity naming
  *   `entity_name`: The literal source identifier as written in the code (snake_case for Python functions, PascalCase for classes/types, qualified `schema.table` for SQL, `Type::method` for Rust paths). For natural-language concepts only, Title Case is acceptable. **NEVER** rewrite a code identifier into spaced Title Case (e.g. `Capture Thread Dump` for `capture_thread_dump` is WRONG). Ensure **consistent naming** across the entire extraction process.
  *   `source_entity`: Source entity name, **identical literal form** as in the entity list above (never re-title-case code identifiers).

  ## Entity types (22)
  *   `entity_type`: MUST be one of `MODULE, FUNCTION, METHOD, CLASS, DATACLASS, ENUM, PROTOCOL, MACRO, FFI_BINDING, CONSTANT, EXCEPTION, SCHEMA, TABLE, COLUMN, DOMAIN_TYPE, SQL_FUNCTION, CAGG, INDEX, GPU_KERNEL, AIS_CONCEPT, LIBRARY, CONCEPT` (22 types). Emit the MOST SPECIFIC type; never collapse a specific type into a generic one. Quick-pick guide for OceanStack:
  - Python free `def`, Rust free `fn`/`pub fn`, SQL trigger handler bodies ã `FUNCTION`
  - Python class/instance methods, Rust `impl` methods written as `Type::method` ã `METHOD`
  - Rust `#[pyfunction]`, `#[pymethods]`, and any PyO3-exported boundary function ã `FFI_BINDING`
  - Rust `macro_rules!` and proc-macros (`wrap_panic!`, `extract_arrow!`) ã `MACRO`
  - Plain Python `class` and Rust `struct` ã `CLASS`
  - Python `@dataclass` / Pydantic models / `AISRecord`-style data carriers ã `DATACLASS`
  - Python `Enum`/`IntFlag`/`IntEnum`, Rust `enum`, SQL `CREATE TYPE ... AS ENUM` ã `ENUM`
  - Python `Protocol`/`ABC` interfaces, Rust `trait` ã `PROTOCOL`
  - Exception/error classes inheriting `Exception`, Rust `Error` enums (`OceanStackError`) ã `EXCEPTION`
  - Python module paths (`oceanstack.ingestion.adapters`), Rust crate/`mod` paths ã `MODULE`
  - Python module-level constants, Rust `const`/`static`, sentinel values, AIS message types 1-27 ã `CONSTANT`
  - SQL `CREATE DOMAIN` types and Rust type aliases (`mmsi_identity`, `h3_cell_index`, `H3Index`) ã `DOMAIN_TYPE`
  - SQL `CREATE TABLE` and `create_hypertable` hypertables ã `TABLE`
  - SQL `CREATE MATERIALIZED VIEW` continuous aggregates ã `CAGG`
  - SQL `CREATE INDEX` objects (GiST / BRIN / H3 / B-tree) ã `INDEX`
  - SQL `CREATE FUNCTION` / `CREATE PROCEDURE` / `CREATE TRIGGER` PL/pgSQL routines (`REFRESH_VESSEL_REGISTRY`, `create_hypertable`) ã `SQL_FUNCTION`
  - SQL column references (`schema.table.column`) ã `COLUMN`
  - SQL schemas (`signals`, `derived`, `events`, `metrics`, `ops`, `ref`, `external`, `kg`) ã `SCHEMA`
  - WGSL / CUDA GPU shaders and kernel entry points (`@compute` functions, workgroup kernels) ã `GPU_KERNEL`
  - Third-party libraries (`Polars`, `PyArrow`, `PostGIS`, `TimescaleDB`, `pgvector`, `pyo3`, `wgpu`) ã `LIBRARY`
  - Maritime / AIS domain concepts (`MMSI`, `IMO`, `COG`, `SOG`, `ROT`, `H3`, `Port Call`, `Dark Activity`, `sentinel value`, `ITU-R M.1371-5`) ã `AIS_CONCEPT`
  - Other architecture / algorithm concepts not matched above (`four-tier dispatch`, `zero-copy Arrow`) ã `CONCEPT`
  Default fallback is `CONCEPT` (non-domain) or `AIS_CONCEPT` (maritime). Emit the specific type ã do NOT merge `FFI_BINDING`/`MACRO`/`METHOD` into `FUNCTION`, `DATACLASS`/`ENUM`/`PROTOCOL` into `CLASS`, `CAGG`/`INDEX` into `TABLE`, `SQL_FUNCTION` into `FUNCTION`, `DOMAIN_TYPE` into `CONSTANT`, or `AIS_CONCEPT` into `CONCEPT`. Do NOT emit types outside the list (`person`, `equipment`, `Other`, `FILE`, `TEST_SUITE`).

  ## Relationship keyword vocabulary
  *   `relationship_keywords`: **VERBS or short verb phrases** describing how source acts on target. Pick from: `calls`, `invokes`, `writes_to`, `reads_from`, `depends_on`, `raises`, `indexed_by`, `implements`, `inherits_from`, `instantiates`, `tests`, `validates`, `validates_against`, `provides`, `wraps`, `aggregates_from`, `materializes`, `refreshes`, `partitions`, `chunked_by`, `joins`, `fires_on`, `triggered_by`, `serialises_to`, `deserialises_from`, `bound_to`, `exports_to`, `decodes`, `parses`, `configures`, `derived_from`, `falls_back_to`, `emits_to`. **Domain hints**: `bound_to`/`exports_to` for PyO3 `#[pyfunction]`/`#[pyclass]`; `decodes`/`parses` for AIS message-type ã decoder; `chunked_by`/`partitions` for TimescaleDB hypertable policies; `fires_on`/`triggered_by` for `CREATE TRIGGER`; `provides` for pytest fixtures; `derived_from` for cagg-on-cagg dependency; `returns_type`/`has_param`/`has_field` for function signature ã type / parameter / dataclass field; `decorates` for decorator ã target; `overrides` for subclass method ã superclass method; `fk_references` for foreign-key column ã referenced table; `partitioned_by` for hypertable ã time/space dimension; `variant_of` for enum variant ã enum. **DO NOT** use nouns like `testing`, `dependency`, `validation`, `configuration`, `implementation`, `functionality`, `framework`, `codebase`, `composition`, `containment`, `software_component`, `data_processing`, `instance_of`, `is_a`, `has_a`, `kind_of`, `type_of`, `member_of`, `part_of`, `component_of` ã these collapse to existing verbs (`instantiates`, `inherits_from`, `depends_on`). Multiple verbs comma-separated. **DO NOT use `<|#|>` for separating multiple keywords within this field.**
